<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>we-term</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="terminal"></div>
    <div id="toast"></div>
    <div id="settings-panel" class="hidden" aria-hidden="true">
        <div id="settings-sheet">
            <div id="settings-header">
                <strong>Settings</strong>
                <button id="settings-close-btn" type="button">Done</button>
            </div>
            <label class="settings-option" for="cursor-blink-toggle">
                <span>Blink cursor</span>
                <input id="cursor-blink-toggle" type="checkbox">
            </label>
            <label class="settings-option" for="haptic-feedback-toggle">
                <span>Haptic feedback</span>
                <input id="haptic-feedback-toggle" type="checkbox">
            </label>
        </div>
    </div>
    <div id="select-overlay" class="hidden">
        <div id="select-toolbar">
            <span id="select-label">Select text, then tap Copy</span>
            <button id="select-copy-btn" type="button">Copy</button>
            <button id="select-done-btn" type="button">Done</button>
        </div>
        <pre id="select-content"></pre>
    </div>
    <div id="paste-overlay" class="hidden">
        <div id="paste-toolbar">
            <span id="paste-label">Long-press below to paste, then tap Send</span>
            <button id="paste-send-btn">Send</button>
            <button id="paste-cancel-btn">Cancel</button>
        </div>
        <textarea id="paste-area" placeholder="Tap here, then long-press → Paste"></textarea>
    </div>
    <div id="button-bar">
        <div id="button-scroll">
            <button class="bar-btn" data-action="settings" id="settings-btn">Set</button>
            <button class="bar-btn modifier-btn" data-modifier="ctrl">Ctrl</button>
            <button class="bar-btn modifier-btn" data-modifier="meta">Meta</button>
            <button class="bar-btn" data-key="tab">Tab</button>
            <button class="bar-btn" data-action="select" id="select-btn">Sel</button>
            <button class="bar-btn" data-action="paste" id="paste-btn">Paste</button>
            <button class="bar-btn" data-key="pageup">PgUp</button>
            <button class="bar-btn" data-key="pagedown">PgDn</button>
            <button class="bar-btn" data-key="up">&#9650;</button>
            <button class="bar-btn" data-key="down">&#9660;</button>
            <button class="bar-btn" data-key="left">&#9664;</button>
            <button class="bar-btn" data-key="right">&#9654;</button>
        </div>
    </div>
    <div id="touch-keyboard" class="hidden" aria-hidden="true"></div>
    <div id="touch-key-preview" class="hidden" aria-hidden="true"></div>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
    <script src="/static/terminal.js"></script>
</body>
</html>
